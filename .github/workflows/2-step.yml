name: Step 2

on:
  push:
    branches:
      - add-project-files

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_3_FILE: ".github/steps/3-step.md"

concurrency:
  group: "step-2"
  cancel-in-progress: true

jobs:
  find_exercise:
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.7.0

  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    needs: [find_exercise]
    outputs:
      qualified: ${{ steps.evaluate.outputs.qualified }}
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      # Decide if this push is real work (a commit that adds/changes a file).
      # Intermediate pushes like publishing an empty branch are ignored so the
      # learner isn't interrupted before they finish the step.
      - name: Evaluate push
        id: evaluate
        uses: actions/github-script@v6
        env:
          commits: ${{ toJson(github.event.commits) }}
        with:
          script: |
            const commits = JSON.parse(process.env.commits || "[]");
            const hasFileWork = commits.some(c =>
              (Array.isArray(c.added) && c.added.length > 0) ||
              (Array.isArray(c.modified) && c.modified.length > 0)
            );
            core.setOutput("qualified", hasFileWork ? "true" : "false");
            if (!hasFileWork) {
              core.info("Push has no file changes yet — ignoring until the learner commits their work.");
            }

      - name: Get response templates
        if: steps.evaluate.outputs.qualified == 'true'
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.3

      - name: Find last comment
        if: steps.evaluate.outputs.qualified == 'true'
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Update comment - checking work
        if: steps.evaluate.outputs.qualified == 'true'
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: Update comment - step results
        if: steps.evaluate.outputs.qualified == 'true'
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 2
            results_table:
              - description: "Criou a branch 'add-project-files' com um commit"
                passed: true

  post_next_step_content:
    name: Post next step content
    needs: [find_exercise, check_step_work]
    # Only advance when the push actually contained the learner's work.
    if: ${{ needs.check_step_work.outputs.qualified == 'true' }}
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.3

      - name: Create comment - step finished
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 3

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_3_FILE }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
